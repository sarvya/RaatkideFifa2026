<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Raatkide — FIFA World Cup 2026</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1>🏆 FIFA World Cup 2026 — Raatkide ⚽</h1>
  <p>Round of 16 pick'em: 4 teams per player, ranked by priority (1st = 4 pts/win ... 4th = 1 pt/win)</p>
</header>

<main>
  <section class="section-leaderboard">
    <h2>🏅 Leaderboard</h2>
    <table>
      <thead>
        <tr><th>#</th><th>Player</th><th>Points</th><th>Teams Alive</th></tr>
      </thead>
      <tbody id="leaderboard"></tbody>
    </table>
  </section>

  <section class="section-players">
    <h2>👥 Players</h2>
    <div class="players-grid" id="players"></div>
  </section>

  <section class="section-bracket">
    <h2>🧩 Bracket</h2>
    <div class="bracket" id="bracket"></div>
  </section>
</main>

<footer>
  Stats are read-only here. Results are managed on the admin page.
</footer>

<script src="data.js"></script>
<script src="bracket-core.js"></script>
<script src="app.js"></script>
</body>
</html>
